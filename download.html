<!DOCTYPE html>
<html lang="fa">

<head>
    <meta charset="UTF-8">
    <title>Downloader</title>
</head>

<body>

<h2 id="status">در حال بارگذاری...</h2>

<script>

async function loadData(){

    const params = new URLSearchParams(window.location.search);

    const building = params.get("building");
    const type = params.get("type");

    const url =
        `apartments/${building}/${type}/images.json`;

    const response = await fetch(url);

    const data = await response.json();

    document.getElementById("status").innerHTML =
        "در حال دانلود تصاویر...";

    for(let i=0;i<data.images.length;i++){

        const imageName = data.images[i];

        const imageUrl =
            `apartments/${building}/${type}/${imageName}`;

        setTimeout(()=>{

            const link = document.createElement("a");

            link.href = imageUrl;

            link.download = imageName;

            document.body.appendChild(link);

            link.click();

            document.body.removeChild(link);

        },i*700);

    }

}
setTimeout(() => {

    window.location.href = "https://app.puzzley.net/mobile/161D-PDFW-D570-9C8A#/nav/menu566";

}, 10000);

loadData();

</script>

</body>

</html>
